server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: inventory-service
              uri: lb://inventory-service
              predicates:
                - Path=/api/inventory/**
          #
          # - id: order-service
          #   uri: lb://order-service
          #   predicates:
          #     - Path=/api/orders/**
          #
          # - id: customer-service
          #   uri: lb://customer-service
          #   predicates:
          #     - Path=/api/customers/**

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka

logging:
  level:
    web: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "gateway,health,info"
  endpoint:
    gateway:
      access: unrestricted
